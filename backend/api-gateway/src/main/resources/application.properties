spring.application.name=api-gateway
server.port=${PORT:8090}

services.auth.url=${AUTH_SERVICE_URL:http://${AUTH_SERVICE_HOST:localhost}:${AUTH_SERVICE_PORT:8081}}
services.application.url=${APPLICATION_SERVICE_URL:http://${APPLICATION_SERVICE_HOST:localhost}:${APPLICATION_SERVICE_PORT:8082}}
services.notification.url=${NOTIFICATION_SERVICE_URL:http://${NOTIFICATION_SERVICE_HOST:localhost}:${NOTIFICATION_SERVICE_PORT:8083}}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://interviewflow-platform.vercel.app,https://*.vercel.app}

management.endpoints.web.exposure.include=health,info
