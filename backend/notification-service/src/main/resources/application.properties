spring.application.name=notification-service
server.port=${PORT:8083}

spring.datasource.url=${NOTIFICATION_DB_URL}
spring.datasource.username=${NOTIFICATION_DB_USERNAME}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}
spring.kafka.consumer.group-id=${NOTIFICATION_CONSUMER_GROUP:notification-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.jwt.secret=${APP_JWT_SECRET}
app.kafka.topics.application-events=${APPLICATION_EVENTS_TOPIC:application-events}
app.kafka.topics.reminder-events=${REMINDER_EVENTS_TOPIC:reminder-events}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS}

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
server.error.include-binding-errors=always
