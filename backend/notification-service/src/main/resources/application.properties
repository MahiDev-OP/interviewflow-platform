spring.application.name=notification-service
server.port=8083

spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5433/interviewflow_notification}
spring.datasource.username=${NOTIFICATION_DB_USERNAME:postgres}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${NOTIFICATION_CONSUMER_GROUP:notification-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.jwt.secret=${APP_JWT_SECRET:interviewflow-local-jwt-secret-key-with-32-chars-minimum}
app.kafka.topics.application-events=${APPLICATION_EVENTS_TOPIC:application-events}
app.kafka.topics.reminder-events=${REMINDER_EVENTS_TOPIC:reminder-events}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://*.loca.lt,https://*.localtunnel.me,https://*.vercel.app,https://*.lhr.life}

management.endpoints.web.exposure.include=health,info
