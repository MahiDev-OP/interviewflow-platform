spring.application.name=application-service
server.port=${PORT:8082}

spring.datasource.url=${APPLICATION_DB_URL}
spring.datasource.username=${APPLICATION_DB_USERNAME}
spring.datasource.password=${APPLICATION_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.jwt.secret=${APP_JWT_SECRET}
app.kafka.topics.application-events=${APPLICATION_EVENTS_TOPIC:application-events}
app.kafka.topics.reminder-events=${REMINDER_EVENTS_TOPIC:reminder-events}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS}

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
server.error.include-binding-errors=always
