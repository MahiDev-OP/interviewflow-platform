spring.application.name=application-service
server.port=${PORT:8082}

spring.datasource.url=${APPLICATION_DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:interviewflow_application}}
spring.datasource.username=${APPLICATION_DB_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${APPLICATION_DB_PASSWORD:${DB_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.jwt.secret=${APP_JWT_SECRET:interviewflow-local-jwt-secret-key-with-32-chars-minimum}
app.kafka.topics.application-events=${APPLICATION_EVENTS_TOPIC:application-events}
app.kafka.topics.reminder-events=${REMINDER_EVENTS_TOPIC:reminder-events}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://interviewflow-platform.vercel.app,https://*.vercel.app}

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
server.error.include-binding-errors=always
