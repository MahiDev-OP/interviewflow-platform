spring.application.name=auth-service
server.port=8081

spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5433/interviewflow_auth}
spring.datasource.username=${AUTH_DB_USERNAME:postgres}
spring.datasource.password=${AUTH_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${APP_JWT_SECRET:interviewflow-local-jwt-secret-key-with-32-chars-minimum}
app.jwt.expiration-millis=${APP_JWT_EXPIRATION_MILLIS:86400000}

management.endpoints.web.exposure.include=health,info
