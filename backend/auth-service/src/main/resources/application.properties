spring.application.name=auth-service
server.port=${PORT:8081}

spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-millis=${APP_JWT_EXPIRATION_MILLIS:86400000}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS}

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
server.error.include-binding-errors=always
