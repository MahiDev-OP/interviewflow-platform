spring.application.name=auth-service
server.port=${PORT:8081}

spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:interviewflow_auth}}
spring.datasource.username=${AUTH_DB_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${AUTH_DB_PASSWORD:${DB_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${APP_JWT_SECRET:interviewflow-local-jwt-secret-key-with-32-chars-minimum}
app.jwt.expiration-millis=${APP_JWT_EXPIRATION_MILLIS:86400000}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://interviewflow-platform.vercel.app,https://*.vercel.app}

management.endpoints.web.exposure.include=health,info
server.error.include-message=always
server.error.include-binding-errors=always
